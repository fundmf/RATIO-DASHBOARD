name: Update Dashboard Data

on:
  schedule:
    # Run every hour to pick up new divergence events quickly
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to manually trigger from GitHub Actions tab anytime

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pycoingecko

      - name: Run data update script (ratio analysis)
        run: python update_data.py

      - name: Update hourly data (BTC, FARTCOIN, SPX6900)
        run: python backfill_hourly.py

      - name: Update liquidity data (BTC price + volume)
        run: python backfill_liquidity.py

      - name: Commit updated data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json fartcoin_hourly.json spx6900_hourly.json liquidity_daily.json fartcoin_liquidity_daily.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%dT%H:%M') data refresh"
          git push

      - name: Detect divergence events and alert Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python detect_events.py

      - name: Commit event state
        run: |
          git add last_events.json
          git diff --staged --quiet || git commit -m "Update event detection state"
          git push
